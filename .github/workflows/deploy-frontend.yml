name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest
    env:
      VITE_BASE_URL: ${{ vars.VITE_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate frontend environment
        run: |
          if [ -z "$VITE_BASE_URL" ]; then
            echo "VITE_BASE_URL repository variable is required."
            exit 1
          fi

          case "$VITE_BASE_URL" in
            https://*/api|https://*/api/) ;;
            *)
              echo "VITE_BASE_URL must be an HTTPS URL ending in /api."
              exit 1
              ;;
          esac

      - name: Build frontend
        run: |
          pnpm --filter frontend exec tsc -b
          BASE_PATH="/${{ github.event.repository.name }}/"
          if [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
            BASE_PATH="/"
          fi
          pnpm --filter frontend exec vite build --base="$BASE_PATH"

      - name: Add SPA fallback for GitHub Pages
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    name: Deploy frontend
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
